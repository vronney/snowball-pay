<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 56" fill="none" role="img" aria-label="SnowballPay icon">
  <defs>
    <!-- Small ball gradient -->
    <radialGradient id="sg1" cx="36%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <!-- Medium ball gradient -->
    <radialGradient id="sg2" cx="36%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <!-- Large ball gradient -->
    <radialGradient id="sg3" cx="36%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f2060"/>
    </radialGradient>
    <!-- Gloss overlays -->
    <radialGradient id="gl1" cx="40%" cy="30%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl2" cx="38%" cy="28%" r="58%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl3" cx="36%" cy="26%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadows (depth) -->
  <ellipse cx="9" cy="49" rx="5.5" ry="1.6" fill="#1e3a8a" opacity="0.25"/>
  <ellipse cx="22" cy="50.5" rx="9.5" ry="2" fill="#1e3a8a" opacity="0.22"/>
  <ellipse cx="44" cy="52" rx="17" ry="2.8" fill="#1e3a8a" opacity="0.2"/>

  <!-- Small ball (origin — past) -->
  <circle cx="9" cy="43" r="5.5" fill="url(#sg1)"/>
  <ellipse cx="7.5" cy="41" rx="2.8" ry="2.2" fill="url(#gl1)"/>

  <!-- Medium ball (growing) -->
  <circle cx="23" cy="38" r="11" fill="url(#sg2)"/>
  <ellipse cx="20.5" cy="35" rx="5.5" ry="4.2" fill="url(#gl2)"/>
  <!-- Snow dots: medium -->
  <circle cx="25.5" cy="40.5" r="0.9" fill="white" opacity="0.45"/>
  <circle cx="21" cy="35.5" r="0.7" fill="white" opacity="0.35"/>
  <circle cx="28" cy="36" r="0.6" fill="white" opacity="0.3"/>

  <!-- Large ball (momentum — present) -->
  <circle cx="44" cy="30" r="19" fill="url(#sg3)"/>
  <ellipse cx="39" cy="24.5" rx="9" ry="7" fill="url(#gl3)"/>

  <!-- Snow particles: large -->
  <circle cx="47" cy="33" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="41" cy="37" r="1.0" fill="white" opacity="0.4"/>
  <circle cx="50" cy="25" r="0.9" fill="white" opacity="0.38"/>
  <circle cx="43" cy="22" r="0.8" fill="white" opacity="0.32"/>
  <circle cx="52" cy="34" r="0.7" fill="white" opacity="0.28"/>
  <circle cx="38" cy="31" r="0.65" fill="white" opacity="0.28"/>
  <circle cx="47" cy="21" r="0.6" fill="white" opacity="0.25"/>

  <!-- Snowflake crystal (center of large ball, very subtle) -->
  <g transform="translate(44, 30)" opacity="0.22" stroke="white" stroke-linecap="round">
    <line x1="0" y1="-5.5" x2="0" y2="5.5" stroke-width="1"/>
    <line x1="-5.5" y1="0" x2="5.5" y2="0" stroke-width="1"/>
    <line x1="-3.9" y1="-3.9" x2="3.9" y2="3.9" stroke-width="0.85"/>
    <line x1="3.9" y1="-3.9" x2="-3.9" y2="3.9" stroke-width="0.85"/>
    <!-- Crystal arms -->
    <line x1="-1.4" y1="-4.0" x2="0" y2="-5.5" stroke-width="0.7"/>
    <line x1="1.4" y1="-4.0" x2="0" y2="-5.5" stroke-width="0.7"/>
    <line x1="-1.4" y1="4.0" x2="0" y2="5.5" stroke-width="0.7"/>
    <line x1="1.4" y1="4.0" x2="0" y2="5.5" stroke-width="0.7"/>
    <line x1="-4.0" y1="-1.4" x2="-5.5" y2="0" stroke-width="0.7"/>
    <line x1="-4.0" y1="1.4" x2="-5.5" y2="0" stroke-width="0.7"/>
    <line x1="4.0" y1="-1.4" x2="5.5" y2="0" stroke-width="0.7"/>
    <line x1="4.0" y1="1.4" x2="5.5" y2="0" stroke-width="0.7"/>
  </g>
</svg>
