<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="f-b1" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="f-b2" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="f-b3" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#0f2060"/>
    </radialGradient>
    <radialGradient id="f-g1" cx="38%" cy="28%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f-g2" cx="38%" cy="28%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f-g3" cx="38%" cy="28%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to rounded square -->
    <clipPath id="f-clip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1424"/>

  <g clip-path="url(#f-clip)">
    <!-- Subtle ambient glow -->
    <circle cx="22" cy="14" r="14" fill="#3b82f6" opacity="0.07"/>

    <!-- Small ball -->
    <circle cx="7" cy="24" r="3.8" fill="url(#f-b1)"/>
    <ellipse cx="6.1" cy="22.8" rx="1.9" ry="1.5" fill="url(#f-g1)"/>

    <!-- Medium ball -->
    <circle cx="15.5" cy="20" r="6.5" fill="url(#f-b2)"/>
    <ellipse cx="14" cy="18.2" rx="3.2" ry="2.5" fill="url(#f-g2)"/>
    <circle cx="17" cy="21.5" r="0.6" fill="white" opacity="0.4"/>

    <!-- Large ball -->
    <circle cx="24" cy="13" r="10" fill="url(#f-b3)"/>
    <ellipse cx="21.5" cy="10.5" rx="4.8" ry="3.8" fill="url(#f-g3)"/>
    <circle cx="26" cy="15" r="0.9" fill="white" opacity="0.45"/>
    <circle cx="22" cy="17" r="0.7" fill="white" opacity="0.35"/>
    <circle cx="27" cy="10" r="0.6" fill="white" opacity="0.3"/>
  </g>
</svg>
