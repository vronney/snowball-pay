<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 56" fill="none" role="img" aria-label="SnowballPay">
  <defs>
    <radialGradient id="dk-sg1" cx="36%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="dk-sg2" cx="36%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="dk-sg3" cx="36%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f2060"/>
    </radialGradient>
    <radialGradient id="dk-gl1" cx="40%" cy="30%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dk-gl2" cx="38%" cy="28%" r="58%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dk-gl3" cx="36%" cy="26%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dk-payGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Ground shadows -->
  <ellipse cx="9" cy="49" rx="5.5" ry="1.6" fill="#1e3a8a" opacity="0.18"/>
  <ellipse cx="22" cy="50.5" rx="9.5" ry="2" fill="#1e3a8a" opacity="0.15"/>
  <ellipse cx="44" cy="52" rx="17" ry="2.8" fill="#1e3a8a" opacity="0.13"/>

  <!-- Small ball -->
  <circle cx="9" cy="43" r="5.5" fill="url(#dk-sg1)"/>
  <ellipse cx="7.5" cy="41" rx="2.8" ry="2.2" fill="url(#dk-gl1)"/>

  <!-- Medium ball -->
  <circle cx="23" cy="38" r="11" fill="url(#dk-sg2)"/>
  <ellipse cx="20.5" cy="35" rx="5.5" ry="4.2" fill="url(#dk-gl2)"/>
  <circle cx="25.5" cy="40.5" r="0.9" fill="white" opacity="0.45"/>
  <circle cx="21" cy="35.5" r="0.7" fill="white" opacity="0.35"/>

  <!-- Large ball -->
  <circle cx="44" cy="30" r="19" fill="url(#dk-sg3)"/>
  <ellipse cx="39" cy="24.5" rx="9" ry="7" fill="url(#dk-gl3)"/>
  <circle cx="47" cy="33" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="41" cy="37" r="1.0" fill="white" opacity="0.4"/>
  <circle cx="50" cy="25" r="0.9" fill="white" opacity="0.38"/>

  <!-- Snowflake crystal -->
  <g transform="translate(44, 30)" opacity="0.22" stroke="white" stroke-linecap="round">
    <line x1="0" y1="-5.5" x2="0" y2="5.5" stroke-width="1"/>
    <line x1="-5.5" y1="0" x2="5.5" y2="0" stroke-width="1"/>
    <line x1="-3.9" y1="-3.9" x2="3.9" y2="3.9" stroke-width="0.85"/>
    <line x1="3.9" y1="-3.9" x2="-3.9" y2="3.9" stroke-width="0.85"/>
  </g>

  <!-- Divider -->
  <line x1="74" y1="14" x2="74" y2="42" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>

  <!-- "Snowball" — dark text for light backgrounds -->
  <text
    x="84"
    y="37"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="-0.6"
    fill="#0f172a"
  >Snowball</text>

  <!-- "Pay" — blue accent -->
  <text
    x="206"
    y="37"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="-0.6"
    fill="url(#dk-payGrad)"
  >Pay</text>
</svg>
